name: validation-tests

# F-G02 (audit round 7): 검증·계측 툴링을 머지 게이트로 승격.
# 동기: R6 F-F1 에서 validate.sh drift 블록이 3개 라운드 동안 silent 하게
# 무력화돼 있었음에도 CI 가 없어 발견이 늦었다. 이 워크플로우는
# validate.sh / sync-drift.sh / 계측 hook 의 회귀를 PR 단계에서 차단한다.
#
# 주의: core/ ↔ .claude/ 의 "라이브" drift 는 .claude/ 가 gitignored 라
# CI fresh clone 에서 검사 불가. 대신 fixture 기반 smoke 로 *검증 로직 자체*를
# 게이트한다 (F-G01 같은 비대칭 결함이 재발하면 즉시 fail).

on:
  pull_request:
    paths:
      - 'validate.sh'
      - 'core/scripts/**'
      - 'core/hooks/**'
      - 'core/skills/**/scripts/**'   # F-I05 (audit R9): ledger.sh 등 skill 내부 계측 스크립트
      - 'extensions/**/scripts/**'    # F-J03 (audit R10): frontend-flow 등 extensions skill 스크립트
      - 'scripts/tests/**'
      - '.github/workflows/validation-tests.yml'
  push:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Run fixture-based validation & instrumentation smoke tests
        run: |
          set -u
          failed=0
          # F-H05 (audit R8): CI-SKIP 마커(.claude 런타임/gh 등 CI 부재 의존) 테스트만 제외,
          # 나머지는 전부 RUN. 기존 mktemp 휴리스틱은 core-only CI-safe 테스트
          # (persona-vote/notify-pr)를 false-skip 하던 결함 → 명시 마커 방식으로 전환.
          for t in scripts/tests/*.sh; do
            if grep -q 'CI-SKIP' "$t"; then
              echo "SKIP (CI-SKIP marker)  $(basename "$t")"
              continue
            fi
            echo "::group::$t"
            if bash "$t"; then
              echo "PASS  $(basename "$t")"
            else
              echo "FAIL  $(basename "$t")"
              failed=1
            fi
            echo "::endgroup::"
          done
          exit $failed
