name: validation-tests

# F-G02 (audit round 7): 검증·계측 툴링을 머지 게이트로 승격.
# 동기: R6 F-F1 에서 validate.sh drift 블록이 3개 라운드 동안 silent 하게
# 무력화돼 있었음에도 CI 가 없어 발견이 늦었다. 이 워크플로우는
# validate.sh / sync-drift.sh / 계측 hook 의 회귀를 PR 단계에서 차단한다.
#
# 주의: core/ ↔ .claude/ 의 "라이브" drift 는 .claude/ 가 gitignored 라
# CI fresh clone 에서 검사 불가. 대신 fixture 기반 smoke 로 *검증 로직 자체*를
# 게이트한다 (F-G01 같은 비대칭 결함이 재발하면 즉시 fail).

on:
  pull_request:
    paths:
      - 'validate.sh'
      - 'setup.sh'                     # F-K06 (audit R11): cloud-init-smoke.sh 가 setup.sh 를
                                       # 실행·검증하는데 트리거 경로에 없어, setup.sh 단독 수정 PR 은
                                       # 두 워크플로 모두 미발화했다 (게이트는 있고 트리거가 없던 상태).
      - 'core/scripts/**'
      - 'core/hooks/**'
      - 'core/skills/**/scripts/**'   # F-I05 (audit R9): ledger.sh 등 skill 내부 계측 스크립트
      - 'extensions/**/scripts/**'    # F-J03 (audit R10): frontend-flow 등 extensions skill 스크립트
      - 'scripts/tests/**'
      - 'scripts/statusline.sh'        # F-L11 (audit R12): statusline-tests.sh 의 피검 대상인데
                                       # 트리거 경로에 없어 단독 수정 PR 의 회귀가 CI PASS 뒤에 숨었다.
      - 'scripts/check-doc-counts.sh'  # F-M08 (audit R13): F-L11 동일 클래스 형제 — 두 게이트
      - 'scripts/eval-regression-check.sh'  # 스크립트의 fail-closed fixture 스모크가 여기서만 도는데
                                       # 단독 수정 PR 이 이 워크플로를 미발화했다 (/tmp 재현 실증).
      - '.github/workflows/validation-tests.yml'
  push:
    branches: [main]

jobs:
  smoke:
    # F-K13 (audit R11): 머지 게이트 플랫폼이 harness 실 운용 플랫폼(Windows git-bash)과
    # 분리돼 Windows 전용 회귀(jq CRLF, uuidgen 부재, 로케일 매칭)가 CI PASS 뒤에 숨었다.
    # windows-latest leg 를 추가해 양 플랫폼을 머지 게이트로 승격.
    strategy:
      fail-fast: false            # ubuntu 결과가 windows red 에 가려지지 않게
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash               # windows 기본 pwsh 대신 git-bash — 실 운용 환경과 동일
    steps:
      - name: Disable autocrlf (Windows)
        if: runner.os == 'Windows'
        run: git config --global core.autocrlf false
        # checkout 전에 실행 — 라인엔딩 변환 노이즈가 아니라 스크립트 로직을 검증
      - uses: actions/checkout@v4
      - name: Install jq (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y jq
        # windows-latest 는 jq 프리인스톨 (러너 이미지 포함)
      - name: Run fixture-based validation & instrumentation smoke tests
        run: |
          set -u
          failed=0
          executed=0
          # F-H05 (audit R8): CI-SKIP 마커(.claude 런타임/gh 등 CI 부재 의존) 테스트만 제외,
          # 나머지는 전부 RUN. 기존 mktemp 휴리스틱은 core-only CI-safe 테스트
          # (persona-vote/notify-pr)를 false-skip 하던 결함 → 명시 마커 방식으로 전환.
          for t in scripts/tests/*.sh; do
            if grep -q 'CI-SKIP' "$t"; then
              echo "SKIP (CI-SKIP marker)  $(basename "$t")"
              continue
            fi
            executed=$((executed+1))
            echo "::group::$t"
            if bash "$t"; then
              echo "PASS  $(basename "$t")"
            else
              echo "FAIL  $(basename "$t")"
              failed=1
            fi
            echo "::endgroup::"
          done
          # F-L10 (audit R12) + F-M09 (audit R13): 플로어 하한(-lt)은 삭제만 잡고 추가를
          # 강제하지 않아 첫 스모크 추가에서 1-slack 으로 열화(zero-headroom 정체).
          # 등가(-ne) 대조로 전환 — 스모크 증감 시 이 기대치를 같은 PR 에서 갱신한다.
          EXPECTED_SMOKE=28
          echo "executed smoke tests: $executed (expected $EXPECTED_SMOKE)"
          if [ "$executed" -ne "$EXPECTED_SMOKE" ]; then
            echo "::error::실행된 스모크 $executed ≠ 기대치 $EXPECTED_SMOKE — 커버리지 소실 또는 기대치 미갱신"
            failed=1
          fi
          exit $failed
