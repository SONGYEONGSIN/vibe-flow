name: eval-regression

on:
  pull_request:
    paths:
      - 'core/skills/**'
      - 'core/agents/**'
      - 'extensions/**'
      - 'core/agents.json'
      - 'templates/.github/workflows/**'
      - 'scripts/eval-regression-check.sh'
      - '.github/workflows/eval-regression.yml'
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install jq + yq
        run: sudo apt-get update && sudo apt-get install -y jq && sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 && sudo chmod +x /usr/local/bin/yq
      - name: Run eval regression check
        run: bash scripts/eval-regression-check.sh
