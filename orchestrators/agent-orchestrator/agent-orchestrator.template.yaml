# Agent Orchestrator 설정 템플릿
#
# 사용법:
#   1. 프로젝트 루트에 agent-orchestrator.yaml 로 복사
#   2. {{PLACEHOLDER}} 값을 프로젝트에 맞게 수정
#   3. ao start 로 실행
#
# 참고: https://github.com/ComposioHQ/agent-orchestrator

port: 3001

# --- 기본 플러그인 ---
defaults:
  runtime: tmux              # tmux | docker | process
  agent: claude-code         # claude-code | codex | aider
  workspace: worktree        # worktree (독립 브랜치) | clone
  notifiers: [desktop]       # desktop | slack | webhook

# --- 프로젝트 ---
projects:
  {{PROJECT_NAME}}:
    repo: {{GITHUB_OWNER}}/{{PROJECT_NAME}}
    path: {{PROJECT_PATH}}
    defaultBranch: main
    sessionPrefix: {{PROJECT_PREFIX}}

# --- 리액션 (CI/CD 자동화) ---
reactions:
  # CI 실패 시 에이전트가 자동 수정 시도
  ci-failed:
    auto: true
    action: send-to-agent
    retries: 2

  # 리뷰어가 변경 요청 시 에이전트가 자동 대응
  changes-requested:
    auto: true
    action: send-to-agent
    escalateAfter: 30m

  # PR 승인 + CI 통과 시 알림 (자동 머지는 기본 OFF)
  approved-and-green:
    auto: false
    action: notify

